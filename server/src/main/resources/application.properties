spring.application.name=store-api

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/coffeebeansdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345a}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL init
spring.sql.init.mode=always

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# JWT (override with JWT_SECRET env var in Render)
app.jwt.secret=${JWT_SECRET:6A586E3272357538782F413F4428472B4B6250655368566D597133743677397A}
app.jwt.expiration-ms=86400000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Static resources
app.upload.dir=uploads

# App config
app.currency=ARS
app.low-stock-threshold=5

server.port=8080

logging.level.org.springframework.security=WARN

# Mercado Pago (override with MP_ACCESS_TOKEN env var in Render)
app.mercadopago.access-token=${MP_ACCESS_TOKEN:}
app.mercadopago.test-buyer-email=${MP_BUYER_EMAIL:}
app.mercadopago.public-base-url=${MP_PUBLIC_URL:https://localhost:8080}

# Email Configuration (override with MAIL_USERNAME/MAIL_PASSWORD env vars in Render)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@example.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.report.email.to=${MAIL_TO:admin@coffeebeans.com}
